name: CI

on:
  push:
  pull_request:

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check app tests
      - run: python -m mypy app/core app/modules app/engines
      - run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=85
      - name: Validate migrations
        env:
          DATABASE_URL: sqlite:///./ci-migrations.db
        run: python -m alembic upgrade head
      - run: docker compose config --quiet
      - run: docker build .

  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - working-directory: java-platform
        run: ./mvnw verify
      - run: docker compose --profile java config --quiet
      - run: docker build java-platform
